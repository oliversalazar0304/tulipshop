<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Tulip Shop</title>

    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/webjars/font-awesome/css/all.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/estilos.css}" rel="stylesheet"/>

    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/rutinas.js}"></script>
</head>
<body>

<header th:fragment="header" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Tulip Shop</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalogo}">Catalogo</a>
                </li>

                <li class="nav-item" th:if="${usuarioLogueado != null}">
                    <a class="nav-link" th:href="@{/carrito}">Carrito</a>
                </li>

                <li class="nav-item" th:if="${usuarioLogueado != null}">
                    <a class="nav-link" th:href="@{/metodos-pago}">Metodos de Pago</a>
                </li>

                <li class="nav-item" th:if="${usuarioLogueado != null}">
                    <a class="nav-link" th:href="@{/pedidos}">Mis Pedidos</a>
                </li>

                <li class="nav-item"
                    th:if="${usuarioLogueado != null and usuarioLogueado.rol != null and usuarioLogueado.rol.nombre == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/admin/productos}">Admin</a>
                </li>
            </ul>

            <div class="d-flex gap-2">
                <a class="btn btn-outline-light"
                   th:if="${usuarioLogueado == null}"
                   th:href="@{/login}">
                    Login
                </a>

                <a class="btn btn-warning"
                   th:if="${usuarioLogueado == null}"
                   th:href="@{/registro}">
                    Registro
                </a>

                <span class="text-white align-self-center me-2"
                      th:if="${usuarioLogueado != null}"
                      th:text="${'Hola, ' + usuarioLogueado.nombreCompleto}">
                    Usuario
                </span>

                <a class="btn btn-danger"
                   th:if="${usuarioLogueado != null}"
                   th:href="@{/logout}">
                    Salir
                </a>
            </div>
        </div>
    </div>
</header>

<footer th:fragment="footer" class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">Tulip Shop &copy; 2026 - Todos los derechos reservados</p>
</footer>

</body>
</html>
