<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="general/fragmentos :: head"></head>
<body>
<header th:replace="general/fragmentos :: header"></header>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Administracion de Productos</h2>
        <a th:href="@{/admin/productos/nuevo}" class="btn btn-success">Nuevo Producto</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.precio}"></td>
                <td th:text="${p.stock}"></td>
                <td th:text="${p.categoria.nombre}"></td>
                <td>
                    <a th:href="@{/admin/productos/editar/{id}(id=${p.id})}" class="btn btn-primary btn-sm">Editar</a>
                    <a th:href="@{/admin/productos/eliminar/{id}(id=${p.id})}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<footer th:replace="general/fragmentos :: footer"></footer>
</body>
</html>
