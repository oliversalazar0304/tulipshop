<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="general/fragmentos :: head"></head>
<body>
<header th:replace="general/fragmentos :: header"></header>

<div class="container mt-4" style="max-width:700px;">
    <div class="card shadow p-4">
        <h2>Formulario de Producto</h2>

        <form th:action="@{/admin/productos/guardar}" th:object="${producto}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label>Nombre</label>
                <input th:field="*{nombre}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Descripción</label>
                <textarea th:field="*{descripcion}" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label>Precio</label>
                <input th:field="*{precio}" type="number" step="0.01" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Stock</label>
                <input th:field="*{stock}" type="number" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Imagen URL</label>
                <input th:field="*{imagenUrl}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Categoria</label>
                <select name="categoriaId" class="form-select" required>
                    <option value="">Seleccione una categoria</option>
                    <option th:each="c : ${categorias}"
                            th:value="${c.id}"
                            th:text="${c.nombre}"
                            th:selected="${producto.categoria != null and producto.categoria.id == c.id}">
                    </option>
                </select>
            </div>

            <button class="btn btn-success">Guardar</button>
        </form>
    </div>
</div>

<footer th:replace="general/fragmentos :: footer"></footer>
</body>
</html>
